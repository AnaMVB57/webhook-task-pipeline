<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhook pipeline dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div class="container mx-auto p-6 max-w-7xl">
    <header class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
      <div>
        <h1 class="text-3xl font-bold text-indigo-400">Pipeline control center</h1>
        <p class="text-sm text-slate-400">Real-time job monitoring and pipeline orchestration</p>
      </div>

      <button id="polling-badge" onclick="togglePolling()"
        class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full text-xs cursor-pointer hover:bg-slate-700 transition border border-emerald-500/20 select-none">
        <span id="polling-indicator" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span id="polling-text">Polling active (2s)</span>
      </button>
    </header>

    <section class="mb-8 bg-slate-800/50 p-5 rounded-xl border border-slate-800">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-slate-300">Trigger test cases</h2>

        <button onclick="clearDatabaseHistory()"
          class="bg-slate-900 border border-rose-500/40 text-rose-400 hover:bg-rose-950/40 px-3 py-1.5 rounded-lg text-xs font-semibold transition cursor-pointer">
          <span class="text-xs">Clear history</span>
        </button>
      </div>

      <div class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <button onclick="triggerPipeline('success')"
            class="bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-lg font-medium transition flex flex-col items-start gap-1 cursor-pointer shadow-md">
            <span class="text-sm font-bold">Success case</span>
            <span class="text-xs text-emerald-100 font-normal text-left">Chains: calculate -> template -> translate (de) -> email</span>
          </button>

          <button onclick="triggerPipeline('fatal-items')"
            class="bg-rose-600 hover:bg-rose-500 text-white p-3 rounded-lg font-medium transition flex flex-col items-start gap-1 cursor-pointer shadow-md">
            <span class="text-sm font-bold">Fatal error</span>
            <span class="text-xs text-rose-100 font-normal text-left">Fails immediately: empty items array</span>
          </button>

          <button onclick="triggerPipeline('fatal-email')"
            class="bg-amber-600 hover:bg-amber-500 text-white p-3 rounded-lg font-medium transition flex flex-col items-start gap-1 cursor-pointer shadow-md">
            <span class="text-sm font-bold">Chained error</span>
            <span class="text-xs text-amber-100 font-normal text-left">Runs steps 1-3 smoothly, then fails at email due to missing field</span>
          </button>
        </div>

        <div class="border-t border-slate-700/50 pt-4">
          
          <div class="grid grid-cols-1 gap-4">
            <button onclick="triggerPipeline('infinite-loop')"
              class="bg-indigo-950 hover:bg-indigo-900 text-indigo-200 p-3 rounded-lg font-medium transition flex flex-col items-start gap-1 cursor-pointer shadow-md border border-indigo-500/30">
              <span class="text-sm font-bold text-indigo-400">Cyclic Infinite Loop Challenge</span>
              <span class="text-xs text-indigo-300 font-normal text-left">Chains: Calculate Loop -> Template Loop -> Translate Loop -> Template Loop. Puts the trace data verification mechanism to the test to prevent endless loops.</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <section class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60">
        <h2 class="text-lg font-bold mb-4 text-rose-400 flex items-center justify-between">
          <span>Failed jobs</span>
          <span id="failed-count" class="text-xs bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded-full font-mono">0</span>
        </h2>
        <div id="failed-jobs-container" class="space-y-4 min-h-[150px]"></div>
      </section>

      <section class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60">
        <h2 class="text-lg font-bold mb-4 text-blue-400 flex items-center justify-between">
          <span>In progress</span>
          <span id="processing-count" class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-mono">0</span>
        </h2>
        <div id="processing-jobs-container" class="space-y-4 min-h-[150px]"></div>
      </section>

      <section class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60">
        <h2 class="text-lg font-bold mb-4 text-emerald-400 flex items-center justify-between">
          <span>Pending and completed</span>
          <span id="completed-count" class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full font-mono">0</span>
        </h2>
        <div id="completed-jobs-container" class="space-y-4 min-h-[150px]"></div>
      </section>

    </main>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    const WEBHOOK_URL = 'http://localhost:3000/api/webhooks/dd777e4f-5236-464d-8a20-387143798446';

    const PIPELINE_MAP = {
      // Flow 1
      '9ccaa884-91f0-482f-a05e-5293810badd1': 'Calculate total amount',
      'f065e32e-0f05-48ad-bf69-98189653a32d': 'Create text template',
      '140bd2dc-6d76-45a2-99fa-9bd0c7d55dbd': 'Translate text message',
      '66c69421-bc23-4540-a791-7af308c6aba1': 'Send email to customer',
      // Flow 2
      'a1111111-1111-1111-1111-111111111111': 'Loop Check - Calculate total',
      'b2222222-2222-2222-2222-222222222222': 'Loop Check - Create template',
      'c3333333-3333-3333-3333-333333333333': 'Loop Check - Translate message'
    };

    let isPollingActive = true;
    let pollingIntervalId = null;

    const payloads = {
      success: {
        customer: "Hans",
        email: "hans.v60@example.com",
        subject: "Order confirmation",
        lang: "de",
        items: [{ name: "Kenia Specialty Coffee", quantity: 1, price: 9200 }]
      },
      'fatal-items': {
        customer: "Mob",
        email: "mob.psycho@example.com",
        lang: "es",
        store_name: "Spirits & Such Consultation",
        items: []
      },
      'fatal-email': {
        customer: "Faye Valentine",
        lang: "fr",
        store_name: "Bebop Commerce",
        items: [{ name: "Filtros Kalita Wave", quantity: 3, price: 6000 }]
      },
      'infinite-loop': {
        customer: "Anton",
        email: "anton.yak12@yamail.com",
        lang: "de",
        store_name: "Ruta Austral Test Lab",
        date: "2026-05-29",
        status: "Verifying Loop Prevention",
        subject: "Cycle Mitigation Check",
        items: [
          { name: "Infinite Loop Prevention Test Run", quantity: 1, price: 9999 }
        ]
      }
    };

    function togglePolling() {
      isPollingActive = !isPollingActive;
      const badge = document.getElementById('polling-badge');
      const indicator = document.getElementById('polling-indicator');
      const text = document.getElementById('polling-text');

      if (isPollingActive) {
        indicator.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
        text.innerText = "Polling active (2s)";
        badge.className = "flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full text-xs cursor-pointer hover:bg-slate-700 transition border border-emerald-500/20 select-none";
        startPolling();
      } else {
        indicator.className = "w-2 h-2 rounded-full bg-amber-500";
        text.innerText = "Polling paused";
        badge.className = "flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full text-xs cursor-pointer hover:bg-slate-700 transition border border-amber-500/40 select-none";
        stopPolling();
      }
    }

    function startPolling() {
      fetchJobs();
      pollingIntervalId = setInterval(fetchJobs, 2000);
    }

    function stopPolling() {
      if (pollingIntervalId) clearInterval(pollingIntervalId);
    }

    async function triggerPipeline(type) {
      try {
        const targetUrl = type === 'infinite-loop'
          ? `${API_URL}/webhooks/loop-token-calculate-000000000001`
          : WEBHOOK_URL;

        const response = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloads[type])
        });
        if (response.ok) {
          if (isPollingActive) fetchJobs();
        } else {
          alert('Server rejected payload delivery setup.');
        }
      } catch (err) {
        console.error(err);
        alert('Error contacting endpoint server.');
      }
    }

    async function clearDatabaseHistory() {
      if (!confirm('Are you sure you want to completely wipe the tables history? This cannot be undone.')) return;

      try {
        const response = await fetch(`${API_URL}/jobs/reset`, { method: 'POST' });
        if (response.ok) {
          fetchJobs();
        } else {
          alert('Failed to clear tables records.');
        }
      } catch (err) {
        console.error(err);
        alert('Network connection drop during wipe request.');
      }
    }

    function getStatusBadge(status) {
      const styles = {
        pending: 'bg-amber-500/10 text-amber-400 border-amber-500/30',
        processing: 'bg-blue-500/10 text-blue-400 border-blue-500/30 animate-pulse',
        completed: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30',
        failed: 'bg-rose-500/10 text-rose-400 border-rose-500/30'
      };
      return `<span class="px-2 py-1 rounded text-xs font-mono font-bold border ${styles[status] || styles.pending}">${status.toUpperCase()}</span>`;
    }

    function renderJobCard(job) {
      let payloadObj = job.payload;
      if (typeof job.payload === 'string') {
        try {
          payloadObj = JSON.parse(job.payload);
        } catch (e) {
          payloadObj = {};
        }
      }
      const payloadString = JSON.stringify(payloadObj, null, 2);
      const pipelineName = PIPELINE_MAP[job.pipelineId] || 'Unknown Pipeline';
      const emailUrl = payloadObj?.email_preview_url;

      return `
        <div class="bg-slate-800 rounded-xl border border-slate-700/60 p-4 shadow-lg transition-all hover:border-indigo-500/40">
          <div class="flex flex-col gap-3">
            <div class="space-y-1">
              <div class="flex items-center gap-2 flex-wrap mb-1">
                <span class="text-xs font-mono text-slate-400 bg-slate-900 px-2 py-0.5 rounded">ID: ${job.id.slice(0, 8)}</span>
                ${getStatusBadge(job.status)}
                <span class="text-xs text-slate-400">Attempts: <strong>${job.attempts}/${job.maxAttempts}</strong></span>
              </div>
              <p class="text-sm font-semibold text-indigo-300">
                ${pipelineName} 
                <span class="text-[11px] text-slate-500 font-mono font-normal ml-1">(${job.pipelineId.slice(0, 8)}...)</span>
              </p>
            </div>
            
            ${emailUrl ? `
              <a href="${emailUrl}" target="ethereal_preview_tab" class="block text-center bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-xs py-2 rounded-lg border border-indigo-500/30 transition shadow-sm font-semibold">
                ✉️ Open Ethereal Email Preview
              </a>
            ` : ''}

            <div class="text-right text-[10px] text-slate-500 font-mono">
              ${job.updatedAt ? new Date(job.updatedAt).toLocaleTimeString() : ''}
            </div>
          </div>
          
          <details class="mt-3 border-t border-slate-700/40 pt-2">
            <summary class="text-xs text-slate-400 hover:text-slate-200 cursor-pointer select-none">View job state payload</summary>
            <pre class="mt-2 p-3 bg-slate-950 rounded text-[11px] font-mono text-indigo-200 overflow-x-auto max-h-40">${payloadString}</pre>
          </details>
        </div>
      `;
    }

    async function fetchJobs() {
      try {
        const response = await fetch(`${API_URL}/jobs`);
        if (!response.ok) return;
        const jobs = await response.json();

        jobs.sort((a, b) => new Date(b.createdAt || 1) - new Date(a.createdAt || 1));

        const failedJobs = jobs.filter(j => j.status === 'failed');
        const processingJobs = jobs.filter(j => j.status === 'processing');
        const completedJobs = jobs.filter(j => j.status === 'completed' || j.status === 'pending');

        document.getElementById('failed-count').innerText = failedJobs.length;
        document.getElementById('processing-count').innerText = processingJobs.length;
        document.getElementById('completed-count').innerText = completedJobs.length;

        const failedContainer = document.getElementById('failed-jobs-container');
        const processingContainer = document.getElementById('processing-jobs-container');
        const completedContainer = document.getElementById('completed-jobs-container');

        if (failedJobs.length === 0) {
          failedContainer.innerHTML = '<div class="text-center py-8 text-slate-600 text-sm border border-dashed border-slate-800 rounded-xl">No failures detected. System running smoothly.</div>';
        } else {
          failedContainer.innerHTML = failedJobs.map(renderJobCard).join('');
        }

        if (processingJobs.length === 0) {
          processingContainer.innerHTML = '<div class="text-center py-8 text-slate-600 text-sm border border-dashed border-slate-800 rounded-xl">No active jobs currently processing.</div>';
        } else {
          processingContainer.innerHTML = processingJobs.map(renderJobCard).join('');
        }

        if (completedJobs.length === 0) {
          completedContainer.innerHTML = '<div class="text-center py-8 text-slate-600 text-sm border border-dashed border-slate-800 rounded-xl">No pending or completed jobs recorded.</div>';
        } else {
          completedContainer.innerHTML = completedJobs.map(renderJobCard).join('');
        }

      } catch (err) {
        console.error("Dashboard synchronization error:", err);
      }
    }

    startPolling();
  </script>
</body>

</html>
